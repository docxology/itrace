# Pandoc / manuscript build configuration (template conventions).
title: "iTrace: an algorithmically verified open-source core for webcam gaze, saccade, and pupil analysis"
author:
  - name: "Daniel Ari Friedman"
    orcid: "0000-0001-6232-9096"
    affiliations:
      - "Active Inference Institute"
date: "June 9, 2026"
abstract-from-file: 00_abstract.md

bibliography: references.bib
fail_on_missing: true        # build fails on an unresolved citation key
link-citations: true
number-sections: true
citation-style: natbib

# Page + link styling (template conventions): tight 0.42in margins and red
# hyperlinks / citations / cross-references. render_manuscript.py mirrors these
# as pandoc -V flags for the working standalone render.
geometry:
  - margin=0.42in
colorlinks: true
linkcolor: red
citecolor: red
urlcolor: red
toccolor: red

figures_dir: ../output/figures
